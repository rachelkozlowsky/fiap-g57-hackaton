apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: g57
data:
  init.sh: |
    #!/bin/sh
    set -e

    # Create Users and Databases
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE USER auth_user WITH PASSWORD 'auth123456';
        CREATE USER video_user WITH PASSWORD 'video123456';
        CREATE USER processing_user WITH PASSWORD 'processing123456';
        CREATE USER notification_user WITH PASSWORD 'notification123456';
        CREATE USER status_user WITH PASSWORD 'status123456';

        CREATE DATABASE auth_db OWNER auth_user;
        CREATE DATABASE video_db OWNER video_user;
        CREATE DATABASE processing_db OWNER processing_user;
        CREATE DATABASE notification_db OWNER notification_user;
        CREATE DATABASE status_db OWNER status_user;
    EOSQL

    # Apply Schemas
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "auth_db" -f /etc/postgres/scripts/auth-schema.sql
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "video_db" -f /etc/postgres/scripts/video-schema.sql
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "processing_db" -f /etc/postgres/scripts/processing-schema.sql
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "notification_db" -f /etc/postgres/scripts/notification-schema.sql
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "status_db" -f /etc/postgres/scripts/status-schema.sql

    # Grant Permissions
    for db in auth_db video_db processing_db notification_db status_db; do
        user="${db%_db}_user"
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$db" <<-EOSQL
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO $user;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO $user;
            GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO $user;
    EOSQL
    done

  auth-schema.sql: |
    -- Auth Service Database Schema
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- Users table - Core entity for Auth Service
    CREATE TABLE users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        name VARCHAR(255) NOT NULL,
        role VARCHAR(50) DEFAULT 'user' CHECK (role IN ('user', 'admin')),
        is_active BOOLEAN DEFAULT true,
        email_verified BOOLEAN DEFAULT false,
        created_at TIMESTAMP DEFAULT NOW(),
        updated_at TIMESTAMP DEFAULT NOW(),
        last_login_at TIMESTAMP
    );

    CREATE INDEX idx_users_email ON users(email);
    CREATE INDEX idx_users_role ON users(role);
    CREATE INDEX idx_users_is_active ON users(is_active);

    -- Sessions table for JWT refresh tokens
    CREATE TABLE sessions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        refresh_token VARCHAR(500) NOT NULL UNIQUE,
        ip_address INET,
        user_agent TEXT,
        expires_at TIMESTAMP NOT NULL,
        created_at TIMESTAMP DEFAULT NOW(),
        last_used_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_sessions_user_id ON sessions(user_id);
    CREATE INDEX idx_sessions_refresh_token ON sessions(refresh_token);
    CREATE INDEX idx_sessions_expires_at ON sessions(expires_at);

    -- Audit logs for security
    CREATE TABLE audit_logs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID REFERENCES users(id) ON DELETE SET NULL,
        action VARCHAR(100) NOT NULL,
        entity_type VARCHAR(50) NOT NULL,
        entity_id UUID,
        ip_address INET,
        user_agent TEXT,
        metadata JSONB,
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_audit_user_id ON audit_logs(user_id);
    CREATE INDEX idx_audit_action ON audit_logs(action);
    CREATE INDEX idx_audit_created_at ON audit_logs(created_at DESC);

    -- Trigger to update updated_at
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    CREATE TRIGGER update_users_updated_at BEFORE UPDATE ON users
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    -- Cleanup function for old sessions
    CREATE OR REPLACE FUNCTION cleanup_old_sessions()
    RETURNS void AS $$
    BEGIN
        DELETE FROM sessions WHERE expires_at < NOW();
        DELETE FROM audit_logs WHERE created_at < NOW() - INTERVAL '90 days';
        RAISE NOTICE 'Auth cleanup completed';
    END;
    $$ LANGUAGE plpgsql;

    -- Default users
    INSERT INTO users (email, password_hash, name, role, email_verified)
    VALUES (
        'admin@g57.com',
        '$2a$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewY5GyYIr.3e.8W2',
        'Administrator',
        'admin',
        true
    );

    INSERT INTO users (email, password_hash, name, role, email_verified)
    VALUES (
        'user@g57.com',
        '$2a$12$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi',
        'Test User',
        'user',
        true
    );

    COMMENT ON TABLE users IS 'Stores user account information';
    COMMENT ON TABLE sessions IS 'JWT refresh token sessions';
    COMMENT ON TABLE audit_logs IS 'Audit trail for security and compliance';

    VACUUM ANALYZE;

  video-schema.sql: |
    -- Video Service Database Schema
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- Videos table - Core entity for Video Service
    -- Note: user_id is stored but user data comes from Auth Service via HTTP
    CREATE TABLE videos (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL, -- Foreign key reference is logical, not enforced (different DB)
        filename VARCHAR(255) NOT NULL,
        original_name VARCHAR(255) NOT NULL,
        size_bytes BIGINT NOT NULL,
        duration_seconds DECIMAL(10, 2),
        status VARCHAR(50) NOT NULL DEFAULT 'pending' 
            CHECK (status IN ('pending', 'queued', 'processing', 'completed', 'failed', 'cancelled')),
        storage_path VARCHAR(500),
        zip_path VARCHAR(500),
        zip_size_bytes BIGINT,
        frame_count INT,
        error_message TEXT,
        retry_count INT DEFAULT 0,
        priority INT DEFAULT 5 CHECK (priority BETWEEN 1 AND 10),
        created_at TIMESTAMP DEFAULT NOW(),
        updated_at TIMESTAMP DEFAULT NOW(),
        queued_at TIMESTAMP,
        processing_started_at TIMESTAMP,
        processing_completed_at TIMESTAMP
    );

    CREATE INDEX idx_videos_user_id ON videos(user_id);
    CREATE INDEX idx_videos_status ON videos(status);
    CREATE INDEX idx_videos_created_at ON videos(created_at DESC);
    CREATE INDEX idx_videos_user_status ON videos(user_id, status);
    CREATE INDEX idx_videos_user_created ON videos(user_id, created_at DESC);

    -- Trigger to update updated_at
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    CREATE TRIGGER update_videos_updated_at BEFORE UPDATE ON videos
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    -- View for video statistics
    CREATE OR REPLACE VIEW video_stats AS
    SELECT 
        COUNT(*) AS total_videos,
        COUNT(CASE WHEN status = 'completed' THEN 1 END) AS completed_videos,
        COUNT(CASE WHEN status = 'failed' THEN 1 END) AS failed_videos,
        COUNT(CASE WHEN status = 'processing' THEN 1 END) AS processing_videos,
        COUNT(CASE WHEN status = 'pending' THEN 1 END) AS pending_videos,
        AVG(CASE WHEN status = 'completed' 
            THEN EXTRACT(EPOCH FROM (processing_completed_at - processing_started_at)) 
            END) AS avg_processing_time_seconds,
        MAX(created_at) AS last_upload_at
    FROM videos
    WHERE created_at > NOW() - INTERVAL '24 hours';

    -- Function to get user videos stats
    CREATE OR REPLACE FUNCTION get_user_video_stats(p_user_id UUID)
    RETURNS TABLE (
        total_videos BIGINT,
        completed_videos BIGINT,
        failed_videos BIGINT,
        total_storage_mb DECIMAL,
        avg_processing_time_seconds DECIMAL
    ) AS $$
    BEGIN
        RETURN QUERY
        SELECT 
            COUNT(*)::BIGINT,
            COUNT(CASE WHEN status = 'completed' THEN 1 END)::BIGINT,
            COUNT(CASE WHEN status = 'failed' THEN 1 END)::BIGINT,
            (SUM(size_bytes) / 1024.0 / 1024.0)::DECIMAL(10,2),
            AVG(EXTRACT(EPOCH FROM (processing_completed_at - processing_started_at)))::DECIMAL(10,2)
        FROM videos
        WHERE user_id = p_user_id;
    END;
    $$ LANGUAGE plpgsql;

    COMMENT ON TABLE videos IS 'Stores video metadata and processing status';

    VACUUM ANALYZE;

  processing-schema.sql: |
    -- Processing Service Database Schema
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- Processing jobs table - Core entity for Processing Service
    -- Note: video_id references Video Service (different DB, logical reference only)
    CREATE TABLE processing_jobs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        video_id UUID NOT NULL, -- Logical reference to Video Service
        user_id UUID NOT NULL, -- Logical reference to Auth Service (for notifications)
        worker_id VARCHAR(100),
        status VARCHAR(50) NOT NULL DEFAULT 'pending'
            CHECK (status IN ('pending', 'running', 'completed', 'failed', 'timeout')),
        started_at TIMESTAMP,
        completed_at TIMESTAMP,
        duration_seconds INT,
        error_message TEXT,
        retry_count INT DEFAULT 0,
        metadata JSONB,
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_jobs_video_id ON processing_jobs(video_id);
    CREATE INDEX idx_jobs_status ON processing_jobs(status);
    CREATE INDEX idx_jobs_worker_id ON processing_jobs(worker_id);
    CREATE INDEX idx_jobs_user_id ON processing_jobs(user_id);
    CREATE INDEX idx_jobs_created_at ON processing_jobs(created_at DESC);

    -- System metrics for monitoring
    CREATE TABLE system_metrics (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        metric_name VARCHAR(100) NOT NULL,
        metric_value DECIMAL(20, 4) NOT NULL,
        labels JSONB,
        recorded_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_metrics_name ON system_metrics(metric_name);
    CREATE INDEX idx_metrics_recorded_at ON system_metrics(recorded_at DESC);

    -- View for processing health
    CREATE OR REPLACE VIEW processing_health AS
    SELECT 
        COUNT(CASE WHEN status = 'pending' THEN 1 END) AS pending_jobs,
        COUNT(CASE WHEN status = 'running' THEN 1 END) AS running_jobs,
        COUNT(CASE WHEN status = 'completed' THEN 1 END) AS completed_jobs,
        COUNT(CASE WHEN status = 'failed' THEN 1 END) AS failed_jobs,
        AVG(duration_seconds) AS avg_duration_seconds,
        MAX(created_at) AS last_job_at
    FROM processing_jobs
    WHERE created_at > NOW() - INTERVAL '1 hour';

    -- Cleanup function for old data
    CREATE OR REPLACE FUNCTION cleanup_old_data()
    RETURNS void AS $$
    BEGIN
        DELETE FROM system_metrics WHERE recorded_at < NOW() - INTERVAL '30 days';
        DELETE FROM processing_jobs 
        WHERE status = 'completed' 
        AND completed_at < NOW() - INTERVAL '30 days';
        
        RAISE NOTICE 'Processing cleanup completed';
    END;
    $$ LANGUAGE plpgsql;

    COMMENT ON TABLE processing_jobs IS 'Tracks video processing jobs';
    COMMENT ON TABLE system_metrics IS 'System performance metrics';

    VACUUM ANALYZE;

  notification-schema.sql: |
    -- Notification Service Database Schema
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Notifications table - Core entity for Notification Service
    -- Note: user_id and video_id are logical references to other services
    CREATE TABLE notifications (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL, -- Logical reference to Auth Service
        video_id UUID, -- Logical reference to Video Service
        type VARCHAR(50) NOT NULL CHECK (type IN ('email', 'sms', 'push')),
        status VARCHAR(50) NOT NULL DEFAULT 'pending'
            CHECK (status IN ('pending', 'sent', 'failed')),
        subject VARCHAR(255),
        message TEXT NOT NULL,
        recipient VARCHAR(255) NOT NULL,
        sent_at TIMESTAMP,
        error_message TEXT,
        retry_count INT DEFAULT 0,
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_notifications_user_id ON notifications(user_id);
    CREATE INDEX idx_notifications_status ON notifications(status);
    CREATE INDEX idx_notifications_type ON notifications(type);
    CREATE INDEX idx_notifications_created_at ON notifications(created_at DESC);

    -- Notification templates
    CREATE TABLE notification_templates (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        template_name VARCHAR(100) NOT NULL UNIQUE,
        template_type VARCHAR(50) NOT NULL CHECK (template_type IN ('email', 'sms', 'push')),
        subject_template VARCHAR(255),
        body_template TEXT NOT NULL,
        variables JSONB, -- List of expected variables
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP DEFAULT NOW(),
        updated_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_templates_name ON notification_templates(template_name);
    CREATE INDEX idx_templates_type ON notification_templates(template_type);

    -- Trigger to update updated_at
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    CREATE TRIGGER update_templates_updated_at BEFORE UPDATE ON notification_templates
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    -- View for notification statistics
    CREATE OR REPLACE VIEW notification_stats AS
    SELECT 
        type,
        COUNT(*) AS total,
        COUNT(CASE WHEN status = 'sent' THEN 1 END) AS sent,
        COUNT(CASE WHEN status = 'failed' THEN 1 END) AS failed,
        COUNT(CASE WHEN status = 'pending' THEN 1 END) AS pending
    FROM notifications
    WHERE created_at > NOW() - INTERVAL '24 hours'
    GROUP BY type;

    -- Cleanup function
    CREATE OR REPLACE FUNCTION cleanup_old_notifications()
    RETURNS void AS $$
    BEGIN
        DELETE FROM notifications 
        WHERE status = 'sent' 
        AND sent_at < NOW() - INTERVAL '30 days';
        
        RAISE NOTICE 'Notification cleanup completed';
    END;
    $$ LANGUAGE plpgsql;

    -- Insert default templates
    INSERT INTO notification_templates (template_name, template_type, subject_template, body_template, variables)
    VALUES 
    (
        'video_completed',
        'email',
        'Video Processing Completed - {{video_name}}',
        'Hello {{user_name}},\n\nYour video "{{video_name}}" has been processed successfully!\n\nYou can download it here: {{download_url}}\n\nBest regards,\nG57 Team',
        '{"user_name": "string", "video_name": "string", "download_url": "string"}'::jsonb
    ),
    (
        'video_failed',
        'email',
        'Video Processing Failed - {{video_name}}',
        'Hello {{user_name}},\n\nUnfortunately, your video "{{video_name}}" failed to process.\n\nError: {{error_message}}\n\nPlease try uploading again or contact support.\n\nBest regards,\nG57 Team',
        '{"user_name": "string", "video_name": "string", "error_message": "string"}'::jsonb
    );

    COMMENT ON TABLE notifications IS 'Stores notification queue and history';
    COMMENT ON TABLE notification_templates IS 'Reusable notification templates';

    VACUUM ANALYZE;

  status-schema.sql: |
    -- Status Service Database Schema
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Status cache table - for caching aggregated status information
    -- This service primarily reads from Video Service via HTTP and caches results
    CREATE TABLE status_cache (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL,
        cache_key VARCHAR(255) NOT NULL UNIQUE,
        cache_data JSONB NOT NULL,
        expires_at TIMESTAMP NOT NULL,
        created_at TIMESTAMP DEFAULT NOW(),
        updated_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_status_cache_user_id ON status_cache(user_id);
    CREATE INDEX idx_status_cache_key ON status_cache(cache_key);
    CREATE INDEX idx_status_cache_expires ON status_cache(expires_at);

    -- Query logs for analytics
    CREATE TABLE query_logs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL,
        query_type VARCHAR(100) NOT NULL,
        response_time_ms INT,
        cache_hit BOOLEAN DEFAULT false,
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX idx_query_logs_user_id ON query_logs(user_id);
    CREATE INDEX idx_query_logs_created_at ON query_logs(created_at DESC);

    -- Trigger to update updated_at
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    CREATE TRIGGER update_status_cache_updated_at BEFORE UPDATE ON status_cache
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    -- Cleanup function for expired cache
    CREATE OR REPLACE FUNCTION cleanup_expired_cache()
    RETURNS void AS $$
    BEGIN
        DELETE FROM status_cache WHERE expires_at < NOW();
        DELETE FROM query_logs WHERE created_at < NOW() - INTERVAL '7 days';
        RAISE NOTICE 'Status cache cleanup completed';
    END;
    $$ LANGUAGE plpgsql;

    -- View for cache statistics
    CREATE OR REPLACE VIEW cache_stats AS
    SELECT 
        COUNT(*) AS total_entries,
        COUNT(CASE WHEN expires_at > NOW() THEN 1 END) AS valid_entries,
        COUNT(CASE WHEN expires_at <= NOW() THEN 1 END) AS expired_entries,
        AVG(EXTRACT(EPOCH FROM (expires_at - created_at))) AS avg_ttl_seconds
    FROM status_cache;

    COMMENT ON TABLE status_cache IS 'Caches status data from Video Service';
    COMMENT ON TABLE query_logs IS 'Logs status queries for analytics';

    VACUUM ANALYZE;
