apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-service
  namespace: g57
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-service
  template:
    metadata:
      labels:
        app: video-service
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: video-db-password
          command:
            - sh
            - -c
            - |
              until psql -h postgres -U video_user -d video_db -c "SELECT 1" > /dev/null 2>&1; do
                echo "Aguardando banco de dados video_db estar totalmente pronto..."
                sleep 2
              done
              echo "Banco pronto! Limpando possível estado dirty de tentativas anteriores..."
              psql -h postgres -U video_user -d video_db -c "UPDATE schema_migrations SET dirty = false WHERE version = 1;" || true
      containers:
        - name: video-service
          image: g57-video-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: postgres-host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: postgres-port
            - name: DB_NAME
              value: video_db
            - name: DB_USER
              value: video_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: video-db-password
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: rabbitmq-url
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: minio-endpoint
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: minio-secret-key
            - name: MINIO_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: minio-use-ssl
            - name: MINIO_BUCKET_RAW
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: minio-bucket-raw
            - name: MAX_UPLOAD_SIZE
              value: "524288000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: GIN_MODE
              value: debug
---
apiVersion: v1
kind: Service
metadata:
  name: video-service
  namespace: g57
spec:
  selector:
    app: video-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
