apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: g57
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: g57-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              value: "http://localhost:8080/api/v1"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics.txt
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: metrics-volume
              mountPath: /app/public/metrics.txt
              subPath: metrics.txt
      volumes:
        - name: metrics-volume
          configMap:
            name: frontend-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: g57
spec:
  selector:
    app: frontend
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173
