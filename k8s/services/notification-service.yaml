apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: g57
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: g57-notification-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: postgres-host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: postgres-port
            - name: DB_NAME
              value: notification_db
            - name: DB_USER
              value: notification_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: notification-db-password
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: rabbitmq-url
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: smtp-host
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: smtp-port
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: smtp-user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: smtp-password
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: smtp-from
            - name: NOTIFICATION_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: notification-queue
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: VIDEO_SERVICE_URL
              value: http://video-service:8082
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: g57
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
