apiVersion: batch/v1
kind: Job
metadata:
  name: metabase-seed
  namespace: g57
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              value: postgres123
          command: ["/bin/sh", "/scripts/seed.sh"]
          volumeMounts:
            - name: seed-scripts
              mountPath: /scripts
      volumes:
        - name: seed-scripts
          configMap:
            name: metabase-seed-scripts
            defaultMode: 0755
