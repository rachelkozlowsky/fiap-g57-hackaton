apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: g57
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway:8080']

      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service:8081']

      - job_name: 'video-service'
        static_configs:
          - targets: ['video-service:8082']

      - job_name: 'status-service'
        static_configs:
          - targets: ['status-service:8083']

      - job_name: 'processing-service'
        static_configs:
          - targets: ['processing-service:8090']

      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service:8091']

      - job_name: 'frontend'
        metrics_path: /metrics.txt
        static_configs:
          - targets: ['frontend:5173']
          
      - job_name: 'rabbitmq'
        static_configs:
          - targets: ['rabbitmq:15692']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: g57
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-storage
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: g57
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: g57
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
