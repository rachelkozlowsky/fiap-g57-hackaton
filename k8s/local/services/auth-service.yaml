apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: g57
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: auth-db-password
          command:
            - sh
            - -c
            - |
              until psql -h postgres -U auth_user -d auth_db -c "SELECT 1" > /dev/null 2>&1; do
                echo "Aguardando banco de dados auth_db estar totalmente pronto..."
                sleep 2
              done
              echo "Banco pronto! Limpando possível estado dirty de tentativas anteriores..."
              psql -h postgres -U auth_user -d auth_db -c "UPDATE schema_migrations SET dirty = false WHERE version = 1;" || true
      containers:
        - name: auth-service
          image: g57-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: PORT
              value: "8081"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: postgres-host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: postgres-port
            - name: DB_NAME
              value: auth_db
            - name: DB_USER
              value: auth_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: auth-db-password
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: g57-config
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: g57-secrets
                  key: jwt-secret
            - name: VIDEO_SERVICE_URL
              value: http://video-service:8082
            - name: GIN_MODE
              value: debug
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: g57
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
