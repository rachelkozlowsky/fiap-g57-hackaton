apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: g57
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: g57-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          volumeMounts:
            - name: metrics-volume
              mountPath: /app/public/metrics.txt
              subPath: metrics.txt
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics.txt
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: VITE_API_URL
              value: "http://api-gateway:8080/api/v1"
              # Note: In a real minikube setup accessed from host, this needs to point to the exposed API Gateway IP/Port. 
              # Or use Ingress. For now, localhost:8080 implies port forwarding or direct access if browser is external.
              # Since it's VITE, it builds at runtime or build time. If it's build time, this env var needs to be set during build.
              # If it's runtime (dev mode), localhost refers to the USER'S machine browser.
      volumes:
        - name: metrics-volume
          configMap:
            name: frontend-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: g57
spec:
  selector:
    app: frontend
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173
