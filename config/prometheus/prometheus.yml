global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'video-service'
    static_configs:
      - targets: ['video-service:8082']

  - job_name: 'status-service'
    static_configs:
      - targets: ['status-service:8083']

  - job_name: 'processing-service'
    static_configs:
      - targets: ['processing-service:8090']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8091']

  - job_name: 'frontend'
    metrics_path: /metrics.txt
    static_configs:
      - targets: ['frontend:5173']
      
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
